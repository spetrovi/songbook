<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Quiz</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
            .lang-en.d-none { display: none; }
            .lang-cz.d-none { display: none; }
        </style>
        <script src="https://unpkg.com/htmx.org@1.7.0/dist/htmx.min.js"></script>
    </head>
    <body>
        <div class="container py-5">

    <!-- Language Toggle -->
            <div class="lang-toggle mb-4 text-center">
                <div class="btn-group">
                    <button id="btn-cz" class="btn btn-primary btn-sm active">CZ</button>
                    <button id="btn-en" class="btn btn-outline-primary btn-sm">EN</button>
                </div>
            </div>

            <h1 class="text-center mb-5">🎉 QUIZ 🎉</h1>

            <form id="quizForm" method="POST" hx-post="/pubquiz_submit" hx-target="this" hx-swap="outerHTML">
                <div class="accordion" id="quizAccordion">

                    {% for category, questions in areas.items() %}
                        <div class="accordion-item">
                            <h2 class="accordion-header" id="heading{{ loop.index }}">
                                <button class="accordion-button collapsed" type="button"
                                        data-bs-toggle="collapse"
                                        data-bs-target="#collapse{{ loop.index }}"
                                        aria-expanded="false"
                                        aria-controls="collapse{{ loop.index }}">
                                    {{ category }}
                                </button>
                            </h2>

                            <div id="collapse{{ loop.index }}" class="accordion-collapse collapse"
                                 aria-labelledby="heading{{ loop.index }}"
                                 data-bs-parent="#quizAccordion">
                                <div class="accordion-body">

                                    {% for q in questions %}
                                        <fieldset class="mb-4" data-question-id="{{ q.id }}">
                                            <legend class="h6 lang-cz">{{ q.question.cz }}</legend>
                                            <legend class="h6 lang-en d-none">{{ q.question.en }}</legend>

                                            {% for ans in q.answers %}
                                                <div class="form-check">
                                                    <input class="form-check-input" type="radio"
                                                           name="q_{{ q.id }}"
                                                           id="q_{{ q.id }}_{{ loop.index0 }}"
                                                           value="{{ ans.value }}">
                                                    <label class="form-check-label lang-text"
                                                           data-cz="{{ ans.cz }}"
                                                           data-en="{{ ans.en }}"
                                                           for="q_{{ q.id }}_{{ loop.index0 }}">{{ ans.cz }}</label>
                                                </div>
                                            {% endfor %}

                                        </fieldset>
                                    {% endfor %}

                                </div>
                            </div>
                        </div>
                    {% endfor %}

                </div>

                <div class="text-center mt-4 id="quizbutton"">
                    <button type="submit" class="btn btn-success btn-lg">SEND</button>
                </div>
            </form>

            <div id="quizContainer">
    <!-- The quiz or results will be replaced here by HTMX -->
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            function setLanguage(lang) {
    // Switch answers
                document.querySelectorAll(".lang-text").forEach(label => {
                    label.textContent = label.dataset[lang];
                });

    // Switch questions
                document.querySelectorAll("legend.lang-cz, legend.lang-en").forEach(legend => {
                    if(lang === "cz") {
                        legend.classList.toggle("d-none", !legend.classList.contains("lang-cz") ? true : false);
                    } else {
                        legend.classList.toggle("d-none", !legend.classList.contains("lang-en") ? true : false);
                    }
                });

    // Update button styling
                if(lang === "cz") {
                    btnCz.classList.add("btn-primary", "active");
                    btnCz.classList.remove("btn-outline-primary");
                    btnEn.classList.add("btn-outline-primary");
                    btnEn.classList.remove("btn-primary", "active");
                } else {
                    btnEn.classList.add("btn-primary", "active");
                    btnEn.classList.remove("btn-outline-primary");
                    btnCz.classList.add("btn-outline-primary");
                    btnCz.classList.remove("btn-primary", "active");
                }
            }

            const btnCz = document.getElementById("btn-cz");
            const btnEn = document.getElementById("btn-en");
            btnCz.addEventListener("click", () => setLanguage("cz"));
            btnEn.addEventListener("click", () => setLanguage("en"));
        </script>

    </body>
</html>
